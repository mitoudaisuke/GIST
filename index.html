<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>My Gist Viewer</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    :root {
      --bg: #111;
      --fg: #eee;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      overflow: hidden;
    }

    body {
      position: fixed;
      inset: 0;
    }

    #viewer {
      box-sizing: border-box;
      width: 100vw;
      height: 100dvh;
      height: 100vh;
      overflow-x: auto;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      background: var(--bg);
      padding:
        env(safe-area-inset-top)
        env(safe-area-inset-right)
        env(safe-area-inset-bottom)
        env(safe-area-inset-left);
    }

    pre {
      margin: 0;
      white-space: pre;
      word-break: normal;
      overflow-wrap: normal;
      font-family: monospace;
      font-size: 13px;
      line-height: 1.35;
      color: var(--fg);
      background: var(--bg);
      box-sizing: border-box;
      min-width: max-content;
      min-height: 100%;
    }
  </style>
</head>
<body>
  <div id="viewer">
    <pre id="content">Loading...</pre>
  </div>

  <script>
    const GIST_RAW_URL = "https://gist.githubusercontent.com/mitoudaisuke/ea5ebde96fbaebe416bde113c7aed631/raw/";
    const contentEl = document.getElementById("content");
    const viewerEl = document.getElementById("viewer");

    let lastLoadedAt = 0;
    const MIN_INTERVAL_MS = 3000;

    function scrollToBottom() {
      requestAnimationFrame(() => {
        viewerEl.scrollTop = viewerEl.scrollHeight;
      });
    }

    async function loadGist(force = false) {
      const now = Date.now();
      if (!force && now - lastLoadedAt < MIN_INTERVAL_MS) return;

      try {
        const url = GIST_RAW_URL + "?t=" + now;
        const res = await fetch(url, { cache: "no-store" });
        if (!res.ok) throw new Error("HTTP " + res.status);

        const text = await res.text();
        contentEl.textContent = text;
        lastLoadedAt = now;
        scrollToBottom();
      } catch (e) {
        console.error(e);
      }
    }

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") {
        loadGist(true);
      }
    });

    window.addEventListener("pageshow", () => {
      loadGist(true);
    });

    window.addEventListener("load", () => {
      loadGist(true);
    });
  </script>
</body>
</html>
