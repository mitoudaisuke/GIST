<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>My Gist Viewer</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #111;
      color: #eee;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      height: 100%;
      overflow: hidden;
    }

    .bar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 10px 12px;
      background: rgba(20, 20, 20, 0.95);
      border-bottom: 1px solid #333;
      box-sizing: border-box;
    }

    .status {
      font-size: 12px;
      color: #aaa;
      white-space: nowrap;
    }

    #viewer {
      height: calc(100vh - 42px);
      overflow-x: auto;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      box-sizing: border-box;
    }

    pre {
      margin: 0;
      padding: 12px;
      white-space: pre;
      word-break: normal;
      overflow-wrap: normal;
      font-family: monospace;
      line-height: 1.35;
      font-size: 13px;
      box-sizing: border-box;
      min-width: max-content;
    }
  </style>
</head>
<body>
  <div class="bar">
    <div class="status" id="status">読み込み待機</div>
  </div>

  <div id="viewer">
    <pre id="content">Loading...</pre>
  </div>

  <script>
    const GIST_RAW_URL = "https://gist.githubusercontent.com/mitoudaisuke/ea5ebde96fbaebe416bde113c7aed631/raw/";
    const contentEl = document.getElementById("content");
    const statusEl = document.getElementById("status");
    const viewerEl = document.getElementById("viewer");

    let lastLoadedAt = 0;
    const MIN_INTERVAL_MS = 3000;

    function scrollToBottom() {
      requestAnimationFrame(() => {
        viewerEl.scrollTop = viewerEl.scrollHeight;
      });
    }

    async function loadGist(force = false) {
      const now = Date.now();
      if (!force && now - lastLoadedAt < MIN_INTERVAL_MS) {
        return;
      }

      statusEl.textContent = "更新中...";

      try {
        const url = GIST_RAW_URL + "?t=" + now;
        const res = await fetch(url, { cache: "no-store" });
        if (!res.ok) {
          throw new Error("HTTP " + res.status);
        }

        const text = await res.text();
        contentEl.textContent = text;
        lastLoadedAt = now;

        const d = new Date();
        const hh = String(d.getHours()).padStart(2, "0");
        const mm = String(d.getMinutes()).padStart(2, "0");
        const ss = String(d.getSeconds()).padStart(2, "0");
        statusEl.textContent = `最終更新 ${hh}:${mm}:${ss}`;

        scrollToBottom();
      } catch (e) {
        statusEl.textContent = "更新失敗";
        console.error(e);
      }
    }

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") {
        loadGist(true);
      }
    });

    window.addEventListener("pageshow", () => {
      loadGist(true);
    });

    window.addEventListener("load", () => {
      loadGist(true);
    });
  </script>
</body>
</html>
