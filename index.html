<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>My Gist Viewer</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #111;
      color: #eee;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      height: 100%;
    }
    .bar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 10px 12px;
      background: rgba(20,20,20,0.95);
      border-bottom: 1px solid #333;
    }
    button {
      font-size: 14px;
      padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid #444;
      background: #222;
      color: #fff;
    }
    .status {
      font-size: 12px;
      color: #aaa;
      margin-left: auto;
      white-space: nowrap;
    }
    pre {
      margin: 0;
      padding: 14px;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      line-height: 1.45;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="bar">
    <button id="reloadBtn">再読込</button>
    <div class="status" id="status">読み込み待機</div>
  </div>
  <pre id="content">Loading...</pre>

  <script>
    const GIST_RAW_URL = "https://gist.githubusercontent.com/mitoudaisuke/ea5ebde96fbaebe416bde113c7aed631/raw/";
    const contentEl = document.getElementById("content");
    const statusEl = document.getElementById("status");
    const reloadBtn = document.getElementById("reloadBtn");

    let lastLoadedAt = 0;
    const MIN_INTERVAL_MS = 3000;

    async function loadGist(force = false) {
      const now = Date.now();
      if (!force && now - lastLoadedAt < MIN_INTERVAL_MS) return;

      statusEl.textContent = "更新中...";
      try {
        const url = GIST_RAW_URL + "?t=" + now;
        const res = await fetch(url, { cache: "no-store" });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const text = await res.text();
        contentEl.textContent = text;
        lastLoadedAt = now;

        const d = new Date();
        const hh = String(d.getHours()).padStart(2, "0");
        const mm = String(d.getMinutes()).padStart(2, "0");
        const ss = String(d.getSeconds()).padStart(2, "0");
        statusEl.textContent = `最終更新 ${hh}:${mm}:${ss}`;
      } catch (e) {
        statusEl.textContent = "更新失敗";
        console.error(e);
      }
    }

    reloadBtn.addEventListener("click", () => loadGist(true));

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") {
        loadGist(true);
      }
    });

    window.addEventListener("pageshow", () => {
      loadGist(true);
    });

    loadGist(true);
  </script>
</body>
</html>
